<svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img">
  <title>Job Search Database ER Diagram</title>
  <desc>Entity-relationship diagram showing 6 tables: companies, job_postings, applications, application_status_history, hard_stop_criteria, position_criteria</desc>

  <rect width="1060" height="620" fill="#fafafa"/>

  <defs>
    <marker id="arrow-fk" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- ── COMPANIES ── -->
  <rect x="30" y="140" width="210" height="292" rx="6" fill="#fff" stroke="#1a73e8" stroke-width="1.5"/>
  <rect x="30" y="140" width="210" height="28" rx="6" fill="#1a73e8"/>
  <rect x="30" y="156" width="210" height="12" fill="#1a73e8"/>
  <text x="135" y="159" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">companies</text>
  <text x="44" y="184" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="30" y1="190" x2="240" y2="190" stroke="#e8e8e8" stroke-width="1"/>
  <text x="44" y="204" font-size="10" fill="#555">company_name</text>
  <text x="44" y="218" font-size="10" fill="#555">linkedin_url · careers_url</text>
  <text x="44" y="232" font-size="10" fill="#555">industry · size_range · country</text>
  <text x="44" y="246" font-size="10" fill="#555">ats_type · ats_slug</text>
  <text x="44" y="260" font-size="10" fill="#555">api_access · fetch_mode</text>
  <text x="44" y="274" font-size="10" fill="#555">posting_language</text>
  <line x1="30" y1="281" x2="240" y2="281" stroke="#e8e8e8" stroke-width="1"/>
  <text x="44" y="295" font-size="10" font-weight="600" fill="#1a73e8">watch_status</text>
  <text x="44" y="309" font-size="10" fill="#555">skip_reason · skip_subcategory</text>
  <text x="44" y="323" font-size="10" fill="#555">notes</text>
  <text x="44" y="337" font-size="10" fill="#555">added_at · updated_at</text>
  <rect x="120" y="408" width="74" height="18" rx="9" fill="#1a73e8" opacity="0.12"/>
  <text x="157" y="420" text-anchor="middle" font-size="10" fill="#1a73e8" font-weight="600">118 rows</text>

  <!-- ── JOB_POSTINGS ── -->
  <rect x="310" y="40" width="210" height="262" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="310" y="40" width="210" height="28" rx="6" fill="#2e7d32"/>
  <rect x="310" y="56" width="210" height="12" fill="#2e7d32"/>
  <text x="415" y="59" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">job_postings</text>
  <text x="324" y="84" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="310" y1="90" x2="520" y2="90" stroke="#e8e8e8" stroke-width="1"/>
  <text x="324" y="104" font-size="10" fill="#b71c1c">🔗 company_id</text>
  <text x="324" y="118" font-size="10" fill="#555">ats_job_id · title</text>
  <text x="324" y="132" font-size="10" fill="#555">location</text>
  <text x="324" y="146" font-size="10" font-weight="600" fill="#2e7d32">work_mode</text>
  <text x="324" y="160" font-size="10" fill="#555">job_url · posting_language</text>
  <line x1="310" y1="167" x2="520" y2="167" stroke="#e8e8e8" stroke-width="1"/>
  <text x="324" y="181" font-size="10" fill="#555">first_seen_at</text>
  <text x="324" y="195" font-size="10" font-weight="600" fill="#2e7d32">last_seen_at</text>
  <text x="324" y="209" font-size="10" fill="#555">is_active</text>
  <text x="324" y="223" font-size="10" fill="#555">raw_payload · notes</text>
  <rect x="324" y="236" width="172" height="14" rx="3" fill="#e8f5e9"/>
  <text x="410" y="246" text-anchor="middle" font-size="9" fill="#2e7d32">UNIQUE(company_id, ats_job_id)</text>

  <!-- ── APPLICATIONS ── -->
  <rect x="310" y="340" width="210" height="210" rx="6" fill="#fff" stroke="#6a1b9a" stroke-width="1.5"/>
  <rect x="310" y="340" width="210" height="28" rx="6" fill="#6a1b9a"/>
  <rect x="310" y="356" width="210" height="12" fill="#6a1b9a"/>
  <text x="415" y="359" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">applications</text>
  <text x="324" y="383" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="310" y1="389" x2="520" y2="389" stroke="#e8e8e8" stroke-width="1"/>
  <text x="324" y="403" font-size="10" fill="#b71c1c">🔗 job_posting_id</text>
  <text x="324" y="417" font-size="10" fill="#b71c1c">🔗 company_id</text>
  <text x="324" y="431" font-size="10" fill="#555">job_title · job_url</text>
  <line x1="310" y1="438" x2="520" y2="438" stroke="#e8e8e8" stroke-width="1"/>
  <text x="324" y="452" font-size="10" font-weight="600" fill="#6a1b9a">stage</text>
  <text x="324" y="466" font-size="10" font-weight="600" fill="#6a1b9a">stage_status</text>
  <text x="324" y="480" font-size="10" fill="#555">applied_at · screening_at …</text>
  <text x="324" y="494" font-size="10" fill="#555">recruiter · hiring_manager</text>
  <text x="324" y="508" font-size="10" fill="#555">cv_version · notes</text>

  <!-- ── APPLICATION_STATUS_HISTORY ── -->
  <rect x="590" y="340" width="220" height="170" rx="6" fill="#fff" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="590" y="340" width="220" height="28" rx="6" fill="#c62828"/>
  <rect x="590" y="356" width="220" height="12" fill="#c62828"/>
  <text x="700" y="359" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">application_status_history</text>
  <text x="604" y="383" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="590" y1="389" x2="810" y2="389" stroke="#e8e8e8" stroke-width="1"/>
  <text x="604" y="403" font-size="10" fill="#b71c1c">🔗 application_id</text>
  <text x="604" y="417" font-size="10" fill="#555">stage</text>
  <text x="604" y="431" font-size="10" fill="#555">stage_status</text>
  <text x="604" y="445" font-size="10" fill="#555">changed_at</text>
  <rect x="604" y="458" width="192" height="14" rx="3" fill="#ffebee"/>
  <text x="700" y="468" text-anchor="middle" font-size="9" fill="#c62828">append-only · written by trigger</text>
  <rect x="618" y="480" width="78" height="16" rx="3" fill="#ffebee"/>
  <text x="657" y="491" text-anchor="middle" font-size="9" fill="#c62828">⚡ auto-logged</text>

  <!-- ── HARD_STOP_CRITERIA ── -->
  <rect x="830" y="40" width="210" height="152" rx="6" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
  <rect x="830" y="40" width="210" height="28" rx="6" fill="#e65100"/>
  <rect x="830" y="56" width="210" height="12" fill="#e65100"/>
  <text x="935" y="59" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">hard_stop_criteria</text>
  <text x="844" y="84" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="830" y1="90" x2="1040" y2="90" stroke="#e8e8e8" stroke-width="1"/>
  <text x="844" y="104" font-size="10" fill="#555">criteria_type</text>
  <text x="844" y="118" font-size="10" fill="#555">criteria_value</text>
  <text x="844" y="132" font-size="10" fill="#555">description</text>
  <text x="844" y="146" font-size="10" fill="#555">is_active · created_at</text>
  <rect x="848" y="158" width="56" height="16" rx="8" fill="#e65100" opacity="0.12"/>
  <text x="876" y="169" text-anchor="middle" font-size="9" fill="#e65100" font-weight="600">6 rows</text>
  <rect x="912" y="158" width="110" height="16" rx="3" fill="#fff3e0"/>
  <text x="967" y="169" text-anchor="middle" font-size="9" fill="#e65100">config — no FK</text>

  <!-- ── POSITION_CRITERIA ── -->
  <rect x="830" y="240" width="210" height="152" rx="6" fill="#fff" stroke="#795548" stroke-width="1.5"/>
  <rect x="830" y="240" width="210" height="28" rx="6" fill="#795548"/>
  <rect x="830" y="256" width="210" height="12" fill="#795548"/>
  <text x="935" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">position_criteria</text>
  <text x="844" y="284" font-size="10.5" fill="#555">🔑 id</text>
  <line x1="830" y1="290" x2="1040" y2="290" stroke="#e8e8e8" stroke-width="1"/>
  <text x="844" y="304" font-size="10" fill="#555">criteria_type</text>
  <text x="844" y="318" font-size="10" fill="#555">criteria_value</text>
  <text x="844" y="332" font-size="10" fill="#555">is_required</text>
  <text x="844" y="346" font-size="10" fill="#555">notes · created_at</text>
  <rect x="848" y="358" width="62" height="16" rx="8" fill="#795548" opacity="0.12"/>
  <text x="879" y="369" text-anchor="middle" font-size="9" fill="#795548" font-weight="600">18 rows</text>
  <rect x="918" y="358" width="104" height="16" rx="3" fill="#efebe9"/>
  <text x="970" y="369" text-anchor="middle" font-size="9" fill="#795548">config — no FK</text>

  <!-- ── RELATIONSHIPS ── -->
  <!-- companies 1→∞ job_postings -->
  <line x1="240" y1="190" x2="310" y2="140" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-fk)"/>
  <text x="252" y="168" font-size="9" fill="#888">1</text>
  <text x="298" y="134" font-size="9" fill="#888">∞</text>

  <!-- companies 1→∞ applications -->
  <line x1="240" y1="250" x2="310" y2="430" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-fk)"/>
  <text x="244" y="245" font-size="9" fill="#888">1</text>
  <text x="296" y="443" font-size="9" fill="#888">∞</text>

  <!-- job_postings 1→∞ applications -->
  <line x1="415" y1="302" x2="415" y2="340" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-fk)"/>
  <text x="420" y="316" font-size="9" fill="#888">1</text>
  <text x="420" y="336" font-size="9" fill="#888">∞</text>

  <!-- applications 1→∞ history (trigger) -->
  <line x1="520" y1="445" x2="590" y2="415" stroke="#c62828" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-fk)"/>
  <text x="528" y="438" font-size="9" fill="#c62828">1</text>
  <text x="578" y="408" font-size="9" fill="#c62828">∞</text>
  <text x="540" y="425" font-size="8" fill="#c62828">trigger</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="510" width="240" height="72" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="44" y="527" font-size="10" font-weight="600" fill="#222">Legend</text>
  <text x="44" y="542" font-size="10" fill="#555">🔑  Primary key</text>
  <text x="44" y="556" font-size="10" fill="#b71c1c">🔗  Foreign key</text>
  <line x1="44" y1="568" x2="68" y2="568" stroke="#888" stroke-width="1.2" marker-end="url(#arrow-fk)"/>
  <text x="73" y="572" font-size="9" fill="#777">FK relationship</text>
  <line x1="148" y1="568" x2="172" y2="568" stroke="#c62828" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-fk)"/>
  <text x="177" y="572" font-size="9" fill="#c62828">trigger write</text>

  <!-- ── FOOTER ── -->
  <text x="530" y="600" text-anchor="middle" font-size="10" fill="#aaa">jobsearch.db — Entity Relationship Diagram</text>
</svg>
